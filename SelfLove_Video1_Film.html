<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#0D1B2A; overflow:hidden; }
  #stage { position:fixed; inset:0; background:#0D1B2A; }
  .slide {
    position:absolute; top:-10%; left:-10%; width:120%; height:120%;
    object-fit:cover; opacity:0; transition:opacity 2.0s ease-in-out;
    will-change:transform, opacity;
  }
  @keyframes zoomIn      { from { transform:scale(1.0);  } to { transform:scale(1.12); } }
  @keyframes zoomOut     { from { transform:scale(1.12); } to { transform:scale(1.0);  } }
  @keyframes zoomOutSlow { from { transform:scale(1.10); } to { transform:scale(1.02); } }
  @keyframes panRight    { from { transform:scale(1.10) translateX(-2.5%); } to { transform:scale(1.10) translateX(2.5%); } }
  @keyframes panLeft     { from { transform:scale(1.10) translateX(2.5%);  } to { transform:scale(1.10) translateX(-2.5%); } }

  .bar { position:fixed; left:0; width:100%; height:7vh; background:#000; z-index:5; }
  #barTop { top:0; } #barBottom { bottom:0; }
  #vignette {
    position:fixed; inset:0; z-index:4; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(6,12,20,.55) 100%);
  }
  #grade {
    position:fixed; inset:0; z-index:3; pointer-events:none;
    background:linear-gradient(180deg, rgba(13,27,42,.25) 0%, transparent 30%, transparent 65%, rgba(13,27,42,.45) 100%);
  }

  .text {
    position:fixed; left:50%; transform:translateX(-50%);
    width:min(86vw, 760px); text-align:center; z-index:6;
    opacity:0; transition:opacity 2.5s ease;
    text-shadow:0 2px 18px rgba(0,0,0,.85);
    bottom:13vh;
  }
  #title {
    font-family:'Cinzel', serif; font-weight:500;
    font-size:clamp(1.1rem, 3.2vw, 2rem);
    letter-spacing:.14em; color:#C9A84C; text-transform:uppercase; line-height:1.5;
  }
  #question {
    font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:500;
    font-size:clamp(1.35rem, 4vw, 2.3rem); color:#F2E6C9; line-height:1.45;
  }
  #closing {
    font-family:'Cormorant Garamond', serif; font-weight:500;
    font-size:clamp(1.3rem, 3.8vw, 2.2rem); color:#F2E6C9; line-height:1.5;
  }
  #closing .accent { color:#C9A84C; font-style:italic; }

  #play {
    position:fixed; inset:0; z-index:10; background:#0D1B2A;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; transition:opacity .8s ease;
  }
  #play .ring {
    width:92px; height:92px; border:1px solid #C9A84C; border-radius:50%;
    display:flex; align-items:center; justify-content:center; margin-bottom:28px;
  }
  #play .tri {
    width:0; height:0; border-left:22px solid #C9A84C;
    border-top:14px solid transparent; border-bottom:14px solid transparent; margin-left:6px;
  }
  #play h1 {
    font-family:'Cinzel', serif; font-weight:400; color:#C9A84C;
    font-size:clamp(1rem, 2.6vw, 1.5rem); letter-spacing:.2em; text-transform:uppercase;
    text-align:center; line-height:1.7; padding:0 8vw;
  }
  #play p {
    font-family:'Cormorant Garamond', serif; font-style:italic; color:#8FA3B8;
    font-size:clamp(.95rem, 2.2vw, 1.2rem); margin-top:16px; letter-spacing:.05em;
  }
</style>

<script>
const SLIDE = 20.37 * 1000;
const kb = ['zoomIn', 'panRight', 'zoomOut', 'panLeft', 'zoomIn', 'zoomOutSlow'];
const N = 6;

function show(i) {
  const img = document.getElementById('s' + i);
  const dur = (i === N - 1) ? 20.37 + 40 : (20.37 + 2.0);
  img.style.animation = kb[i] + ' ' + dur + 's linear forwards';
  img.style.opacity = '1';
  if (i > 0) {
    setTimeout(() => { document.getElementById('s' + (i-1)).style.opacity = '0'; }, 200);
  }
  if (i < N - 1) setTimeout(() => show(i + 1), SLIDE);
}

function schedule() {
  const title = document.getElementById('title');
  const question = document.getElementById('question');
  const closing = document.getElementById('closing');
  setTimeout(() => title.style.opacity = '1', 1500);
  setTimeout(() => title.style.opacity = '0', 11000);
  setTimeout(() => question.style.opacity = '1', 122.2 * 1000 * 0.60);
  setTimeout(() => question.style.opacity = '0', 122.2 * 1000 * 0.60 + 15000);
  setTimeout(() => closing.style.opacity = '1', SLIDE * (N - 1) + 4000);
}

document.getElementById('play').addEventListener('click', function() {
  this.style.opacity = '0'; this.style.pointerEvents = 'none';
  setTimeout(() => this.style.display = 'none', 800);
  const vo = document.getElementById('vo');
  vo.volume = 1;
  vo.play();
  show(0);
  schedule();
});
</script>
